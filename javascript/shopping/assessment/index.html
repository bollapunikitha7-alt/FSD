<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>shopping site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }
    .page{
    position: relative;
    width: 100vw;
    height: 100vh;
}

.page img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    position: absolute;
    
  }

    .search-box {
            position: absolute;
            top: 10px;
            left: 50%;
            padding: 10px;
            border-radius: 30px;
            width: 60%;
          }
    .navbar{
      background-color: black;
      padding: 15px;
      top: 20px;

    }
    .navbar ul {
        list-style: none;
        display: flex;         
        gap: 120px;                  
       
    }
    .navbar ul li {
            color: white;
            cursor: pointer;
            font-size: 15px;
        }
   .navbar ul li:hover {
            color: red;
   }
   
    
  </style>
</head>
<body>
  <h2>Welcome to the Shopping Site</h2>
  <nav class="navbar">
    <ul>
        <li>Login</li>
        <li>Fashion</li>
        <li>Mobiles & Tablets</li>
        <li>Electronics</li>
        <li>TV & Appliances</li>
        <li>Home & Furniture</li>
        <li>Contact Us</li>
    </ul>
</nav>

   <div class="page">
        <img src="as1.jpeg" alt="Shopping Image">
        <div class="search-box">
            <input type="text" placeholder="Search products">
            <button>Search</button>
        </div>
    </div>
    <div class="login-box">
    <h3>Login</h3>
    username: <input type="text" id="username"><br><br>
    password: <input type="text" id="password"><br><br>
    <button onclick="login()">Login</button>
    </div>
  
</body>
<script src="index.js"></script>
</html>
